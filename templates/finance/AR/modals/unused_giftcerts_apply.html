      <div class="mb-2 fw-semibold">2) Select Workorder</div>
      <div class="table-responsive">
        <table class="table table-sm align-middle mb-0">
          <thead>
            <tr>
              <th style="width:1%;"></th>
              <th>Workorder</th>
              <th>Description</th>
              <th class="text-end">Open</th>
            </tr>
          </thead>
          <tbody>
            {% for wo in workorders %}
              <tr>
                <td>
                  <input class="form-check-input wo-radio"
                         type="radio"
                         name="workorder"
                         value="{{ wo.id }}"
                         data-open="{{ wo.open_balance_calc|default_if_none:0 }}">
                </td>
                <td style="white-space:nowrap;">WO {{ wo.workorder }}</td>
                <td>{{ wo.description|default:"—" }}</td>
                <td class="text-end">{{ wo.open_balance_calc|floatformat:2 }}</td>
              </tr>
            {% empty %}
              <tr><td colspan="4" class="text-muted">No open workorders.</td></tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
