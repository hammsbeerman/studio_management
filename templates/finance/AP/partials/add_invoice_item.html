{% load static %}

<div class="card">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div>
        <h5 class="mb-0">{{ title }}</h5>
        <div class="text-muted small">Search by name, description, or vendor part #.</div>
      </div>

      <button
        type="button"
        class="btn btn-sm btn-outline-success"
        hx-get="{% url 'finance:add_item_to_vendor_vendor_invoice' vendor=vendor invoice=invoice %}"
        hx-target="#add_to_vendor_panel"
        hx-swap="innerHTML"
      >
        <img src="{% static 'img/site/green_plus_48.png' %}" style="width:16px;height:16px;">
        Add item to vendor
      </button>
    </div>

    <select
      class="form-select"
      name="name"
      data-ap-picker="1"
      hx-trigger="change"
      hx-get="{% url 'finance:ap_add_invoice_item_invoice_vendor' vendor=vendor invoice=invoice %}"
      hx-target="#remainder"
      hx-swap="innerHTML"
    >
      <option value="" selected>Start typing to search…</option>
      {% for object in items %}
        <option value="{{ object.internal_part_number.id }}">
          {{ object.name }} — {{ object.vendor_part_number|default:"" }} — {{ object.description|default:"" }}
        </option>
      {% endfor %}
    </select>

    <div id="add_to_vendor_panel" class="mt-3"></div>
  </div>
</div>
