<div class="modal-content">
  <div class="modal-header">
    <h5 class="modal-title">Post AP Invoice #{{ invoice.id }}</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
  </div>

  <div class="modal-body">
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'finance:ap_post_invoice' id=invoice.id %}">
      {% csrf_token %}

      <div class="mb-2">
        <label class="form-label">Payment date *</label>
        <input type="date" name="paid_date" class="form-control" required>
      </div>

      <div class="mb-2">
        <label class="form-label">Method *</label>
        <select name="method" class="form-select" required>
          <option value="">-- select --</option>
          <option value="Check">Check</option>
          <option value="ACH">ACH</option>
          <option value="Credit Card">Credit Card</option>
          <option value="Cash">Cash</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="mb-2">
        <label class="form-label">Reference (check # / confirmation)</label>
        <input type="text" name="reference" class="form-control">
      </div>

      <div class="mb-2">
        <label class="form-label">Amount paid *</label>
        <input
          type="text"
          id="amount_paid"
          name="amount"
          class="form-control"
          value="{{ default_amount }}"
          required
        >
        <div class="form-text">
          If you change the amount, a note is required (partial payment / discount / credit / etc).
        </div>
      </div>

      <div class="mb-2">
        <label class="form-label">Note</label>
        <textarea id="payment_note" name="note" class="form-control" rows="2"></textarea>
        <div id="note_hint" class="form-text" style="display:none;">
          Note required when amount paid differs from invoice total.
        </div>
      </div>

      <div class="mt-3 d-flex justify-content-end" style="gap:10px;">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Post</button>
      </div>
    </form>

    <script>
      (function () {
        const amount = document.getElementById("amount_paid");
        const note = document.getElementById("payment_note");
        const hint = document.getElementById("note_hint");

        if (!amount || !note || !hint) return;

        const expected = String(amount.value || "").trim(); // initial default_amount
        function norm(s) {
          return String(s || "").replace(/\$/g, "").replace(/,/g, "").trim();
        }
        function different(a, b) {
          return norm(a) !== norm(b);
        }

        function sync() {
          if (different(amount.value, expected)) {
            hint.style.display = "block";
          } else {
            hint.style.display = "none";
          }
        }

        amount.addEventListener("input", sync);
        sync();
      })();
    </script>
  </div>
</div>
