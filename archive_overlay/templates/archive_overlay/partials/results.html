<div class="card"><div class="card-header">Results</div><div class="card-body">{% if results.error %}<div class="alert alert-warning">{{ results.error }}</div>{% endif %}<div class="list-group">{% for item in results.results %}<div class="list-group-item"><div class="fw-bold">{{ item.filename }}</div><div class="small text-muted">{{ item.path }}</div><form method="post" action="{% url 'archive_overlay:link' %}" class="mt-2">{% csrf_token %}<input type="hidden" name="archive_item_id" value="{{ item.id }}"><button class="btn btn-sm btn-outline-primary">Link asset</button></form></div>{% empty %}<div class="text-muted">No results.</div>{% endfor %}</div></div></div>
