<div class="list-group">{% for item in results.results %}<div class="list-group-item"><div class="fw-bold">{{ item.filename }}</div><div class="small text-muted">{{ item.path }}</div><form method="post" action="{% url 'archive_overlay:link' %}" class="mt-2">{% csrf_token %}<input type="hidden" name="archive_item_id" value="{{ item.id }}"><input type="hidden" name="customer_id" value="{{ customer_id }}"><input type="hidden" name="workorder_id" value="{{ workorder_id }}"><button class="btn btn-sm btn-primary">Link</button></form></div>{% empty %}<div class="text-muted">No results.</div>{% endfor %}</div>
