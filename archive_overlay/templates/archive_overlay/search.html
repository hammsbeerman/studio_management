{% extends "base.html" %}
{% block content %}
<div class="container py-3">
  <h2>Archive Search</h2>
  <form method="get" class="mb-3">
    <div class="input-group">
      <input type="text" class="form-control" name="q" value="{{ query }}" placeholder="Search archive">
      <button class="btn btn-primary" type="submit">Search</button>
    </div>
  </form>
  {% if results %}
    {% include "archive_overlay/partials/results.html" with results=results %}
  {% endif %}
</div>
{% endblock %}
